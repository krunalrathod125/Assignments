<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Task 2: Function to Calculate Sum</h1>
    <script>
        function calculateSum(a, b) {
            return a + b;
        }

        let a = parseFloat(prompt("Enter a number:"));
        let b = parseFloat(prompt("Enter a number to add to " + a + ":"));

        let result = calculateSum(a, b);
        console.log("Sum:", result);
    </script>
</body>
</html>
