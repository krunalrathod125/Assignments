<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

</head>

<body>
    <h1>Task 1: Check if a Number is Positive, Negative, or Zero</h1>

    <script>
        let number = -5;

        if (number > 0) {
            console.log("The number is Positive");
        }
        else if (number < 0) {
            console.log("The number is Negative");
        }
        else {
            console.log("The number is Zero");
        }
    </script>
</body>

</html>
