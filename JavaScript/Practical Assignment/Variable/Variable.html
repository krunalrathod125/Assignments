<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Variables</title>
</head>
<body>
    <script>
        // JavaScript Variables
var name = "Krunal";
var age = 21;
 console.log(name);
 console.log(age);

name = "Krunal ";

let city = "Surat";
console.log(city);

city = "Ahmedabad";
console.log(city);

const country = "India";
console.log(country);



//                 let       Var        Const
// Redeclare      No          Yes         No
// Reassign       Yes         Yes         No

    </script>
</body>
</html>
