<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Task 2: Sum All Even Numbers Between 1 and 20 Using while Loop</h1>
    <script>
        let i = 1;
        let sum = 0;

        while (i <= 20) {
            if (i % 2 === 0) {
                sum += i;
            }
            i++;
        }

        console.log("Sum of even numbers between 1 and 20:", sum);
    </script>
</body>
</html>
