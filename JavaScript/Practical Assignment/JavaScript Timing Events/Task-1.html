<!DOCTYPE html>
<html lang="en">
<head>

<body>
    <h1>Task 1: Change Background Color After 5 Seconds Using setTimeout()</h1>

        setTimeout(function() {
            document.body.style.backgroundColor = "lightblue";
        }, 5000);
    </script>
