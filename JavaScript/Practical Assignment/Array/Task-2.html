<body>
    <h1>Task 2: Find Sum of All Elements in an Array</h1>
    <script>
        let numbers = [1, 2, 3, 4, 5];
        let sum = 0;
        for (let i = 0; i < numbers.length; i++) {
            sum += numbers[i];
        }
        console.log("Sum:", sum);
    </script>
</body>
