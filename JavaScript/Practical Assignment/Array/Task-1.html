<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Task 1: Array Operations with Fruits</h1>
    <script>
        let fruits = ["Apple", "Banana", "Cherry"];
        console.log("Original Array:", fruits);

        // Adding a new fruit to the array
        fruits.push("Orange");
        console.log("After Adding Orange:", fruits);

        // Removing the last fruit from the array
        fruits.pop();
        console.log("After Removing Last Fruit:", fruits);

        // Accessing a specific fruit
        console.log("First Fruit:", fruits[0]);
    </script>
</body>
</html>
